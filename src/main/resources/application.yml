spring:
  application:
    name: security-service
  datasource:
    url: jdbc:h2:file:./data/securitydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    oauth2:
      authorizationserver:
        issuer: http://localhost:8089
  main:
    allow-bean-definition-overriding: true

server:
  port: 8089
  ssl:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

security:
  mtls:
    enabled: false
    key-store: classpath:certs/client-keystore.p12
    key-store-password: changeit
    trust-store: classpath:certs/client-truststore.p12
    trust-store-password: changeit
    protocol: TLS
  api-key:
    header-name: X-API-KEY
    default-validity-days: 90

vault:
  uri: http://localhost:8200
  token: dev-token
  enabled: false

# Logging Configuration
logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

